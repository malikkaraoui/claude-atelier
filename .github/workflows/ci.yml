name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Lint markdown refs + CLAUDE.md length
        run: npm run lint

      - name: Shellcheck pre-push-gate
        run: shellcheck scripts/pre-push-gate.sh
